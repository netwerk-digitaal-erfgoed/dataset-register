version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/'
    # Check daily, but hold most updates for a cooldown so they don’t churn.
    # @lde/* is excluded from the cooldown, so our own LDE packages land within a
    # day of release while third-party packages wait out the delay (exclude always
    # wins over the cooldown).
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
      exclude:
        - '@lde/*'
    groups:
      lde: # Our own LDE packages; bump together and fast (no cooldown).
        patterns:
          - '@lde/*'
      nx: # Grouped so they bump together; the Nx migrate workflow runs code migrations on the resulting PR.
        patterns:
          - 'nx'
          - '@nx/*'
      comunica:
        patterns:
          - '@comunica/*'
      eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'eslint'
          - 'eslint-plugin-svelte'
      fastify:
        patterns:
          - '@fastify/*'
          - 'fastify'
      opentelemetry:
        patterns:
          - '@opentelemetry/*'
      flowbite:
        patterns:
          - 'flowbite'
          - 'flowbite-svelte'
          - 'flowbite-svelte-icons'
          - '@flowbite-svelte-plugins/*'
      tailwindcss:
        patterns:
          - '@tailwindcss/*'
          - 'tailwindcss'
      svelte:
        patterns:
          - '@sveltejs/*'
          - 'svelte'
          - 'svelte-check'
          - 'vite'
      vitest:
        patterns:
          - '@vitest/*'
          - 'vitest'
