version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      nx: # Grouped so they bump together; the Nx migrate workflow runs code migrations on the resulting PR.
        patterns:
          - 'nx'
          - '@nx/*'
      comunica:
        patterns:
          - '@comunica/*'
      eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'eslint'
          - 'eslint-plugin-svelte'
      fastify:
        patterns:
          - '@fastify/*'
          - 'fastify'
      opentelemetry:
        patterns:
          - '@opentelemetry/*'
      flowbite:
        patterns:
          - 'flowbite'
          - 'flowbite-svelte'
          - 'flowbite-svelte-icons'
          - '@flowbite-svelte-plugins/*'
      tailwindcss:
        patterns:
          - '@tailwindcss/*'
          - 'tailwindcss'
      svelte:
        patterns:
          - '@sveltejs/*'
          - 'svelte'
          - 'svelte-check'
          - 'vite'
      vitest:
        patterns:
          - '@vitest/*'
          - 'vitest'
