version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: 'nx' # Handled by the Nx migrate workflow, which also runs code migrations.
      - dependency-name: '@nx/*' # Handled by the Nx migrate workflow, which also runs code migrations.
    groups:
      comunica:
        patterns:
          - '@comunica/*'
      eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'eslint'
          - 'eslint-plugin-svelte'
      fastify:
        patterns:
          - '@fastify/*'
          - 'fastify'
      flowbite:
        patterns:
          - 'flowbite'
          - 'flowbite-svelte'
          - 'flowbite-svelte-icons'
          - '@flowbite-svelte-plugins/*'
      tailwindcss:
        patterns:
          - '@tailwindcss/*'
          - 'tailwindcss'
      svelte:
        patterns:
          - '@sveltejs/*'
          - 'svelte'
          - 'svelte-check'
          - 'vite'
      vitest:
        patterns:
          - '@vitest/*'
          - 'vitest'
