services:
  qlever:
    build: ./docker/qlever
    volumes:
      - ./docker/qlever/index.settings.json:/config/index.settings.json
      - qlever-data:/data
    ports:
      - '7001:7001'
    command:
      - sh
      - -c
      - |
        echo "" | qlever-index --index-basename local -s /config/index.settings.json -F nt -f -
        qlever-server --index-basename local --port 7001 --persist-updates --access-token $SPARQL_ACCESS_TOKEN

  typesense:
    image: typesense/typesense:30.0
    volumes:
      - typesense-data:/data
    ports:
      - '8108:8108'
    command:
      - '--data-dir=/data'
      - '--api-key=${TYPESENSE_API_KEY:-dev-typesense-key}'
      - '--enable-cors'

  valkey:
    image: valkey/valkey:9.0-alpine
    volumes:
      - valkey-data:/data
    ports:
      - '6379:6379'
    # Append-only persistence so the cache survives container restarts — the
    # cross-deployment durability we want from Valkey (locally this mirrors the
    # k8s store surviving pod rolls).
    command:
      - valkey-server
      - '--appendonly'
      - 'yes'
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  qlever-ui:
    image: adfreiburg/qlever-ui:latest
    volumes:
      - ./docker/qlever-ui/entrypoint.sh:/app/entrypoint.sh
      - ./docker/qlever-ui/Qleverfile-ui.yml:/app/Qleverfile-ui.yml
    entrypoint: /app/entrypoint.sh
    ports:
      - '7002:7000'
    environment:
      - DJANGO_SUPERUSER_USERNAME=root # QLever UI is Django-based.
      - DJANGO_SUPERUSER_PASSWORD=admin
      - DJANGO_SUPERUSER_EMAIL=root@localhost

volumes:
  qlever-data:
  typesense-data:
  valkey-data:
